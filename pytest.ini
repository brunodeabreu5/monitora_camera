[pytest]
# Pytest configuration for Hikvision Radar Pro

# Test discovery
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
testpaths = tests

# Output options
addopts =
    # Show extra test summary info
    -ra

    # Markers
    --strict-markers

    # Show local variables in tracebacks
    --showlocals

    # Shorter traceback format
    --tb=short

    # Coverage (if pytest-cov is installed)
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=60

    # Verbose output
    -v

# Minimum pytest version
minversion = 7.0

# Markers for categorizing tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests (fast, isolated)
    gui: marks tests that require GUI/Qt
    camera: marks tests that require real camera access
    network: marks tests that require network access

# Filter warnings
filterwarnings =
    # Ignore common deprecation warnings
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

    # Treat warnings as errors in tests (uncomment to enable)
    # error

# Qt configuration
qt_api = pyside6

# Coverage configuration
[coverage:run]
source = src
omit =
    */tests/*
    */migrations/*
    */__pycache__/*
    */site-packages/*
    */dist-packages/*
    */venv/*
    */.venv/*
branch = True

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    class .*\bProtocol\b):
    @(abc\.)?abstractmethod

[coverage:html]
directory = htmlcov

[coverage:xml]
output = coverage.xml

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = tests/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S
